<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Dovilio Ferrari Neto — Test Engineer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="src/base.css"/>
  <link rel="stylesheet" href="src/v1.css"/>

  <style>
    /* Font family tweaks (Tweak: typeface) */
    [data-typeface="modern"] { --font-display: "Inter Tight", system-ui, sans-serif; --font-text: "Inter", system-ui, sans-serif; }
    [data-typeface="grotesk"] { --font-display: "Space Grotesk", system-ui, sans-serif; --font-text: "Space Grotesk", system-ui, sans-serif; }
    [data-typeface="editorial"] { --font-display: "Instrument Serif", Georgia, serif; --font-text: "Inter", system-ui, sans-serif; }

    /* Accent tweak overrides */
    [data-accent="blue-green"] { --accent-blue: oklch(0.70 0.14 240); --accent-green: oklch(0.74 0.12 160); }
    [data-accent="electric"]   { --accent-blue: oklch(0.72 0.18 230); --accent-green: oklch(0.82 0.16 155); }
    [data-accent="muted"]      { --accent-blue: oklch(0.62 0.08 235); --accent-green: oklch(0.62 0.07 160); }
    [data-accent="mono"]       { --accent-blue: var(--ink-500); --accent-green: var(--ink-500); }

    body { transition: background 0.3s var(--ease), color 0.3s var(--ease); }
  </style>
</head>
<body data-screen-label="Dovilio Portfolio" data-theme="light" data-density="normal" data-accent="blue-green" data-typeface="modern">

  <!-- Top chrome: lang + theme -->
  <div class="chrome">
    <div class="pill-group" role="group" aria-label="Language">
      <button class="pill" data-lang-btn="pt" aria-pressed="true">PT</button>
      <button class="pill" data-lang-btn="en" aria-pressed="false">EN</button>
      <button class="pill" data-lang-btn="de" aria-pressed="false">DE</button>
    </div>
    <div class="pill-group" role="group" aria-label="Theme">
      <button class="pill" data-theme-btn="light" aria-pressed="true" title="Light">☀</button>
      <button class="pill" data-theme-btn="dark" aria-pressed="false" title="Dark">☾</button>
    </div>
  </div>

  <!-- Tweaks panel (hidden; opens via toolbar toggle) -->
  <aside class="tweaks-panel" id="tweaks-panel">
    <h4>Tweaks</h4>
    <div class="row">
      <span class="label">Theme</span>
      <div class="seg" data-tweak="theme">
        <button data-value="light" aria-pressed="true">Light</button>
        <button data-value="dark" aria-pressed="false">Dark</button>
      </div>
    </div>
    <div class="row">
      <span class="label">Density</span>
      <div class="seg" data-tweak="density">
        <button data-value="compact" aria-pressed="false">Compact</button>
        <button data-value="normal" aria-pressed="true">Normal</button>
        <button data-value="spacious" aria-pressed="false">Wide</button>
      </div>
    </div>
    <div class="row">
      <span class="label">Accent</span>
      <div class="seg" data-tweak="accent">
        <button data-value="blue-green" aria-pressed="true">BL·GR</button>
        <button data-value="electric" aria-pressed="false">EL</button>
        <button data-value="muted" aria-pressed="false">MT</button>
        <button data-value="mono" aria-pressed="false">MN</button>
      </div>
    </div>
    <div class="row">
      <span class="label">Typeface</span>
      <div class="seg" data-tweak="typeface">
        <button data-value="modern" aria-pressed="true">Inter</button>
        <button data-value="grotesk" aria-pressed="false">Grotesk</button>
        <button data-value="editorial" aria-pressed="false">Serif</button>
      </div>
    </div>
    <div class="row">
      <span class="label">Language</span>
      <div class="seg" data-tweak="lang">
        <button data-value="pt" aria-pressed="true">PT</button>
        <button data-value="en" aria-pressed="false">EN</button>
        <button data-value="de" aria-pressed="false">DE</button>
      </div>
    </div>
  </aside>

  <!-- Edit-mode defaults -->
  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "light",
      "density": "normal",
      "accent": "blue-green",
      "typeface": "modern",
      "lang": "pt"
    }/*EDITMODE-END*/;
  </script>

  <!-- Mount point -->
  <main>
    <div id="mount-v1"></div>
  </main>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="src/content.js"></script>

  <!-- V1 component (inlined so it works when opened via file://) -->
  <script type="text/babel">
    const V1 = ({ t, lang }) => {
      const c = t.contact;
      const now = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      const ts = `${now.getUTCFullYear()}-${pad(now.getUTCMonth()+1)}-${pad(now.getUTCDate())} ${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())} UTC`;

      const [copied, setCopied] = React.useState(null);
      const copy = (val, key) => {
        navigator.clipboard?.writeText(val);
        setCopied(key);
        setTimeout(() => setCopied(null), 1400);
      };

      const dovName = "Dovilio Ferrari Neto";

      return (
        <div className="v1">
          <div className="v1-topstrip">
            <div className="container">
              <div className="cell"><span className="dot"></span><span>{t.status}</span></div>
              <div className="cell"><span>{t.location}</span></div>
              <div className="cell"><span>REV 2026.04 · {ts}</span></div>
            </div>
          </div>

          <section className="v1-hero">
            <div className="container">
              <div>
                <div className="meta">
                  <span>DFN · 01</span>
                  <span>{t.role}</span>
                  <span>EST. 2015</span>
                </div>
                <h1>
                  Dovilio<br/>
                  <span className="line2">Ferrari Neto.</span>
                </h1>
                <p className="tagline">{t.tagline}</p>
                <div className="cta-row">
                  <a href={`mailto:${c.email}`} className="v1-btn primary">
                    {t.ui.sendEmail} →
                  </a>
                  <a href={c.linkedinUrl} target="_blank" rel="noopener" className="v1-btn">
                    LinkedIn ↗
                  </a>
                  <a href="uploads/Curr%C3%ADculo%20%E2%80%94%20Dovilio%20Ferrari%20Neto.pdf" target="_blank" rel="noopener" download className="v1-btn">
                    {t.sections.download}
                  </a>
                </div>
              </div>
              <div className="v1-portrait">
                <img src="assets/dovilio.jpg" alt={dovName} />
                <div className="tag">
                  <span>DFN</span>
                  <span>SÃO PAULO · BR</span>
                </div>
              </div>
            </div>
          </section>

          <section className="v1-stats">
            <div className="container">
              <div className="v1-stat">
                <div className="n">4<span className="plus">+</span></div>
                <div className="l">{t.ui.yearsExperience}</div>
              </div>
              <div className="v1-stat">
                <div className="n">4</div>
                <div className="l">{t.ui.languagesSpoken}</div>
              </div>
              <div className="v1-stat">
                <div className="n">2</div>
                <div className="l">{lang === "pt" ? "OEMs globais (VW, MB)" : lang === "de" ? "globale OEMs (VW, MB)" : "global OEMs (VW, MB)"}</div>
              </div>
              <div className="v1-stat">
                <div className="n">DE<span style={{color:"var(--fg-dim)"}}>/</span>BR</div>
                <div className="l">{t.ui.continents}</div>
              </div>
            </div>
          </section>

          <section className="v1-section v1-about" id="about">
            <div className="container">
              <div className="header">
                <div className="section-label">01 · {t.sections.about}</div>
                <h2>{t.about.title}</h2>
              </div>
              <div className="body">
                <div></div>
                <p className="lede">{t.about.body}</p>
              </div>
            </div>
          </section>

          <section className="v1-section" id="experience">
            <div className="container">
              <div className="header">
                <div className="section-label">02 · {t.sections.experience}</div>
                <h2>{lang === "pt" ? "Onde atuei." : lang === "de" ? "Wo ich gearbeitet habe." : "Where I've worked."}</h2>
              </div>
              {t.experience.map((e, i) => (
                <div className="v1-exp-item" key={i}>
                  <div className="when">
                    <div>{e.period}</div>
                    {e.status && <span className="badge">{e.status}</span>}
                  </div>
                  <div>
                    <div className="role">{e.role}</div>
                    <div className="company">
                      {e.company}<span className="loc">{e.location}</span>
                    </div>
                    <div className="bullets">
                      {e.bullets.map((b, j) => (
                        <div className="bullet" key={j}>
                          <div className="k">{b.label}</div>
                          <div className="t">{b.text}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </section>

          <section className="v1-section" id="skills">
            <div className="container">
              <div className="header">
                <div className="section-label">03 · {t.sections.skills}</div>
                <h2>{lang === "pt" ? "Stack técnica." : lang === "de" ? "Technischer Stack." : "Technical stack."}</h2>
              </div>
              <div className="v1-skills-grid">
                {t.skills.technical.map((s, i) => (
                  <div className="v1-skill" key={i}>
                    <div className="k">{s.k}</div>
                    <div className="v">{s.v}</div>
                  </div>
                ))}
              </div>
              <div className="v1-soft">
                {t.skills.soft.map((s, i) => <span key={i}>{s}</span>)}
              </div>
            </div>
          </section>

          <section className="v1-section" id="languages">
            <div className="container">
              <div className="header">
                <div className="section-label">04 · {t.sections.languages} / {t.sections.education}</div>
                <h2>{lang === "pt" ? "Idiomas e formação." : lang === "de" ? "Sprachen und Ausbildung." : "Languages and education."}</h2>
              </div>
              <div className="v1-two-col">
                <div className="v1-block">
                  <h3>{t.sections.languages}</h3>
                  {t.languages.map((l, i) => (
                    <div className="v1-lang-row" key={i}>
                      <div className="lang">{l.lang}</div>
                      <div className="level">{l.level}</div>
                      <div className="inst">{l.inst}</div>
                    </div>
                  ))}
                </div>
                <div className="v1-block">
                  <h3>{t.sections.education}</h3>
                  {t.education.map((e, i) => (
                    <div className="v1-edu" key={i}>
                      <div className="degree">{e.degree}</div>
                      <div className="school">{e.school} · {e.year}</div>
                    </div>
                  ))}
                  <h3 style={{marginTop: 32}}>{t.sections.certifications}</h3>
                  {t.certifications.map((cert, i) => (
                    <div className="v1-cert" key={i}>
                      <div className="name">{cert.name}</div>
                      <div className="issuer">{cert.issuer}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </section>

          <section className="v1-section" id="interests">
            <div className="container">
              <div className="header">
                <div className="section-label">05 · {t.sections.interests}</div>
                <h2>{lang === "pt" ? "Fora do escritório." : lang === "de" ? "Außerhalb des Büros." : "Outside the office."}</h2>
              </div>
              <div className="v1-skills-grid v1-interests">
                {t.interests.map((it, i) => (
                  <div className="v1-skill" key={i}>
                    <div className="k">{it.k}</div>
                    <div className="v">{it.v}</div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section className="v1-contact" id="contact">
            <div className="container">
              <div className="section-label" style={{marginBottom: 32}}>06 · {t.sections.contact}</div>
              <h2>
                {lang === "pt" ? "Vamos conversar." : lang === "de" ? "Sprechen wir." : "Let's talk."}
              </h2>
              <div className="grid">
                <button className="v1-contact-card" onClick={() => copy(c.email, "email")}>
                  <div className="label">Email</div>
                  <div className="value">{c.email}</div>
                  <div className="action">{copied === "email" ? t.ui.copied + " ✓" : t.ui.copy + " →"}</div>
                </button>
                <button className="v1-contact-card" onClick={() => copy(c.phone, "phone")}>
                  <div className="label">{t.ui.call}</div>
                  <div className="value">{c.phone}</div>
                  <div className="action">{copied === "phone" ? t.ui.copied + " ✓" : t.ui.copy + " →"}</div>
                </button>
                <a className="v1-contact-card" href={c.linkedinUrl} target="_blank" rel="noopener">
                  <div className="label">LinkedIn</div>
                  <div className="value">/dovilio-ferrari-neto</div>
                  <div className="action">{t.ui.openLinkedIn} ↗</div>
                </a>
              </div>
            </div>
          </section>

          <footer className="v1-footer">
            <div className="container">
              <div>© {now.getFullYear()} Dovilio Ferrari Neto</div>
              <div>v1 · engineering-brief</div>
            </div>
          </footer>
        </div>
      );
    };

    window.V1 = V1;
  </script>

  <script type="text/babel">
    // ========================================================
    // App shell: state, listener, render, tweaks
    // ========================================================

    const state = {
      theme: localStorage.getItem("dfn.theme") || TWEAK_DEFAULTS.theme,
      density: localStorage.getItem("dfn.density") || TWEAK_DEFAULTS.density,
      accent: localStorage.getItem("dfn.accent") || TWEAK_DEFAULTS.accent,
      typeface: localStorage.getItem("dfn.typeface") || TWEAK_DEFAULTS.typeface,
      lang: localStorage.getItem("dfn.lang") || TWEAK_DEFAULTS.lang,
    };

    function applyState() {
      const b = document.body;
      b.setAttribute("data-theme", state.theme);
      b.setAttribute("data-density", state.density);
      b.setAttribute("data-accent", state.accent);
      b.setAttribute("data-typeface", state.typeface);

      // Update pill pressed states
      document.querySelectorAll("[data-lang-btn]").forEach(b => {
        b.setAttribute("aria-pressed", b.dataset.langBtn === state.lang);
      });
      document.querySelectorAll("[data-theme-btn]").forEach(b => {
        b.setAttribute("aria-pressed", b.dataset.themeBtn === state.theme);
      });
      // Tweak segs
      document.querySelectorAll("[data-tweak]").forEach(seg => {
        const key = seg.dataset.tweak;
        seg.querySelectorAll("button").forEach(b => {
          b.setAttribute("aria-pressed", b.dataset.value === state[key]);
        });
      });
    }

    function persist(key, val) {
      state[key] = val;
      localStorage.setItem("dfn." + key, val);
      applyState();
      render();
      try {
        const edits = {};
        edits[key] = val;
        window.parent.postMessage({type: "__edit_mode_set_keys", edits}, "*");
      } catch (e) {}
    }

    let v1Root = null;
    function render() {
      if (!window.V1 || !window.CONTENT) return;
      const t = window.CONTENT[state.lang];
      const el = document.getElementById("mount-v1");
      if (!v1Root) v1Root = ReactDOM.createRoot(el);
      v1Root.render(React.createElement(window.V1, { t, lang: state.lang }));
    }

    // Wire up buttons
    document.querySelectorAll("[data-lang-btn]").forEach(b => {
      b.addEventListener("click", () => persist("lang", b.dataset.langBtn));
    });
    document.querySelectorAll("[data-theme-btn]").forEach(b => {
      b.addEventListener("click", () => persist("theme", b.dataset.themeBtn));
    });
    document.querySelectorAll("[data-tweak]").forEach(seg => {
      const key = seg.dataset.tweak;
      seg.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => persist(key, btn.dataset.value));
      });
    });

    // Edit-mode protocol (Tweaks toggle)
    const tweaksPanel = document.getElementById("tweaks-panel");
    window.addEventListener("message", (ev) => {
      const d = ev.data || {};
      if (d.type === "__activate_edit_mode") tweaksPanel.classList.add("open");
      else if (d.type === "__deactivate_edit_mode") tweaksPanel.classList.remove("open");
      else if (d.type === "__edit_mode_set_keys" && d.edits) {
        Object.entries(d.edits).forEach(([k, v]) => {
          if (k in state) {
            state[k] = v;
            localStorage.setItem("dfn." + k, v);
          }
        });
        applyState();
        render();
      }
    });
    try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch (e) {}

    requestAnimationFrame(() => {
      applyState();
      render();
    });
    window.addEventListener("load", () => { applyState(); render(); });
  </script>
</body>
</html>
